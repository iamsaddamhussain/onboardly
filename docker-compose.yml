# Runs the full stack on the home server. Images are pulled from GHCR;
# DB_PASSWORD, SERVER_IMAGE and CLIENT_IMAGE are supplied by the deploy job
# (or a local .env file when running by hand).
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: onboardly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    image: ${SERVER_IMAGE}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Override the appsettings connection string to point at the db container.
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=onboardly;Username=postgres;Password=${DB_PASSWORD}"
    depends_on:
      - db
    restart: unless-stopped

  client:
    image: ${CLIENT_IMAGE}
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  db-data:
