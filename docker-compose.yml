services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: onboardly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=onboardly;Username=postgres;Password=${DB_PASSWORD}"
    depends_on:
      - db
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "9000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  db-data:
