name: CI

# Builds and validates both apps in the monorepo on every push / PR.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- ASP.NET Core API (server/) ---
  server:
    name: Server (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore server

      - name: Build
        run: dotnet build server --no-restore --configuration Release

      - name: Test
        # Runs tests if any test projects exist; no-op otherwise.
        run: dotnet test server --no-build --configuration Release --verbosity normal

  # --- React + Vite SPA (client/) ---
  client:
    name: Client (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: client/yarn.lock

      - name: Install
        run: yarn --cwd client install --frozen-lockfile

      - name: Typecheck (lint)
        run: yarn --cwd client lint

      - name: Build
        run: yarn --cwd client build
