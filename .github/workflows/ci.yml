name: CI

# Builds and validates both apps in the monorepo on every push / PR.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # --- ASP.NET Core API (server/) ---
  server:
    name: Server (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore server

      - name: Build
        run: dotnet build server --no-restore --configuration Release

      - name: Test
        # Runs tests if any test projects exist; no-op otherwise.
        run: dotnet test server --no-build --configuration Release --verbosity normal

  # --- React + Vite SPA (client/) ---
  client:
    name: Client (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: client/yarn.lock

      - name: Install
        run: yarn --cwd client install --frozen-lockfile

      - name: Typecheck (lint)
        run: yarn --cwd client lint

      - name: Build
        run: yarn --cwd client build

  # --- Build & push Docker images to GHCR (only on main) ---
  images:
    name: Build & push images
    needs: [server, client]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      prefix: ${{ steps.img.outputs.prefix }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image prefix
        id: img
        run: echo "prefix=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.prefix }}-server:latest
            ${{ steps.img.outputs.prefix }}-server:${{ github.sha }}

      - name: Build & push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.prefix }}-client:latest
            ${{ steps.img.outputs.prefix }}-client:${{ github.sha }}

  # --- Deploy to the home server over SSH (only on main) ---
  deploy:
    name: Deploy to home server
    needs: images
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to the server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: docker-compose.yml
          target: ~/onboardly

      - name: Pull & restart containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd ~/onboardly
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export SERVER_IMAGE="${{ needs.images.outputs.prefix }}-server:latest"
            export CLIENT_IMAGE="${{ needs.images.outputs.prefix }}-client:latest"
            docker compose pull
            docker compose up -d
            docker image prune -f

